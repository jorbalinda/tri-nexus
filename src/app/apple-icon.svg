<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>

  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Flag pole -->
  <rect x="46" y="38" width="9" height="104" rx="4" fill="white"/>

  <!-- Checkered flag: 4 columns x 3 rows -->
  <!-- Row 1 -->
  <rect x="55" y="38" width="20" height="20" fill="white"/>
  <rect x="75" y="38" width="20" height="20" fill="#0f172a"/>
  <rect x="95" y="38" width="20" height="20" fill="white"/>
  <rect x="115" y="38" width="20" height="20" fill="#0f172a"/>
  <!-- Row 2 -->
  <rect x="55" y="58" width="20" height="20" fill="#0f172a"/>
  <rect x="75" y="58" width="20" height="20" fill="white"/>
  <rect x="95" y="58" width="20" height="20" fill="#0f172a"/>
  <rect x="115" y="58" width="20" height="20" fill="white"/>
  <!-- Row 3 -->
  <rect x="55" y="78" width="20" height="20" fill="white"/>
  <rect x="75" y="78" width="20" height="20" fill="#0f172a"/>
  <rect x="95" y="78" width="20" height="20" fill="white"/>
  <rect x="115" y="78" width="20" height="20" fill="#0f172a"/>

  <!-- Flag outline -->
  <rect x="55" y="38" width="80" height="60" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
</svg>
