<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Flag pole -->
  <rect x="26" y="22" width="5" height="56" rx="2.5" fill="white"/>

  <!-- Checkered flag: 4 columns x 3 rows, dark alternating squares -->
  <!-- Row 1 -->
  <rect x="31" y="22" width="11" height="11" fill="white"/>
  <rect x="42" y="22" width="11" height="11" fill="#0f172a"/>
  <rect x="53" y="22" width="11" height="11" fill="white"/>
  <rect x="64" y="22" width="11" height="11" fill="#0f172a"/>
  <!-- Row 2 -->
  <rect x="31" y="33" width="11" height="11" fill="#0f172a"/>
  <rect x="42" y="33" width="11" height="11" fill="white"/>
  <rect x="53" y="33" width="11" height="11" fill="#0f172a"/>
  <rect x="64" y="33" width="11" height="11" fill="white"/>
  <!-- Row 3 -->
  <rect x="31" y="44" width="11" height="11" fill="white"/>
  <rect x="42" y="44" width="11" height="11" fill="#0f172a"/>
  <rect x="53" y="44" width="11" height="11" fill="white"/>
  <rect x="64" y="44" width="11" height="11" fill="#0f172a"/>

  <!-- Flag outline to unify the grid -->
  <rect x="31" y="22" width="44" height="33" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
</svg>
